spring.application.name=gift-4u

# Oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xe
spring.datasource.username=C##GIFT4U
spring.datasource.password=1234

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# JWT
jwt.secret=${JWT_SECRET:changeme-use-env-in-production-2026!!}
jwt.access-token-validity-ms=3600000

# Profile upload
app.base-url=http://localhost:8080
app.upload.profile-dir=uploads/profiles
app.upload.max-file-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB