name: CD

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-develop
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ~/gift4u
            git fetch origin
            git restore backend/gift-4u/mvnw frontend/package-lock.json 2>/dev/null || true
            git pull origin develop
            chmod +x scripts/deploy-ec2.sh
            bash scripts/deploy-ec2.sh
